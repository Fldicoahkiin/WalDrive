<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2030"/>
      <stop offset="1" stop-color="#121319"/>
    </linearGradient>
    <linearGradient id="folder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7d87f4"/>
      <stop offset="1" stop-color="#5560c9"/>
    </linearGradient>
    <linearGradient id="tab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8f98f7"/>
      <stop offset="1" stop-color="#6b76e0"/>
    </linearGradient>
  </defs>

  <!-- macOS icon grid: 824x824 rounded tile centered in 1024 (100px safe margin) -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#tile)"/>
  <rect x="111" y="111" width="802" height="802" rx="176" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="7"/>

  <!-- folder tab (far left, behind everything) -->
  <rect x="212" y="402" width="130" height="80" rx="26" fill="url(#tab)"/>

  <!-- walrus: only the top half of the face peeks over the rim -->
  <g>
    <rect x="352" y="302" width="320" height="300" rx="140" fill="#f3f2fb"/>
    <circle cx="442" cy="416" r="24" fill="#23243a"/>
    <circle cx="582" cy="416" r="24" fill="#23243a"/>
    <circle cx="435" cy="408" r="8" fill="#ffffff"/>
    <circle cx="575" cy="408" r="8" fill="#ffffff"/>
    <ellipse cx="512" cy="458" rx="22" ry="15" fill="#23243a"/>
  </g>

  <!-- folder body: the hero — hides the mouth, only eyes peek over -->
  <rect x="192" y="472" width="640" height="356" rx="56" fill="url(#folder)"/>
  <rect x="214" y="486" width="596" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.28"/>

  <!-- tusks hanging in front of the rim -->
  <rect x="450" y="466" width="40" height="138" rx="20" fill="#ffffff" transform="rotate(3 470 535)"/>
  <rect x="534" y="466" width="40" height="138" rx="20" fill="#ffffff" transform="rotate(-3 554 535)"/>

  <!-- flippers gripping the rim, toe creases fanning outward -->
  <g>
    <ellipse cx="384" cy="472" rx="38" ry="30" fill="#f3f2fb"/>
    <path d="M 374 455 L 370 488" stroke="#c9cdf0" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M 396 455 L 398 488" stroke="#c9cdf0" stroke-width="9" stroke-linecap="round" fill="none"/>
  </g>
  <g>
    <ellipse cx="640" cy="472" rx="38" ry="30" fill="#f3f2fb"/>
    <path d="M 628 455 L 626 488" stroke="#c9cdf0" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M 650 455 L 654 488" stroke="#c9cdf0" stroke-width="9" stroke-linecap="round" fill="none"/>
  </g>
</svg>
