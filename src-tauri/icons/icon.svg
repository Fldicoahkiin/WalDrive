<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d1e2a"/>
      <stop offset="1" stop-color="#121319"/>
    </linearGradient>
    <linearGradient id="tusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d9dcff"/>
    </linearGradient>
  </defs>
  <!-- macOS icon grid: 824x824 rounded tile centered in a 1024 canvas (100px safe-area margin) -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#tile)"/>
  <rect x="111" y="111" width="802" height="802" rx="176" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="7"/>
  <!-- walrus tusks drawn as a W; two accent eyes make the face -->
  <g transform="translate(512,512) scale(0.805) translate(-512,-512)">
    <path d="M 270 420 L 405 740 L 512 500 L 619 740 L 754 420"
          fill="none" stroke="url(#tusk)" stroke-width="96"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="405" cy="330" r="34" fill="#7c86f2"/>
    <circle cx="619" cy="330" r="34" fill="#7c86f2"/>
  </g>
</svg>
